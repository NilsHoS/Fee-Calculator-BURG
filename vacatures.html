<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="/BURG-Apps/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/BURG-Apps/favicon-16.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>BURG Vacatures</title>
<link rel="apple-touch-icon" href="/Fee-Calculator-BURG/icon-192.png">
<link rel="stylesheet" href="./styles-dark.css">
<style>
  :root {
    --card-w: min(480px, 92vw);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }

  .header {
    width: 100%;
    max-width: 560px;
  }

  .back-link {
    position: fixed;
    top: 18px;
    left: 16px;
    z-index: 200;
  }

  .progress-bar { width: 100%; max-width: 560px; padding: 0 20px 14px; }
  .progress-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue-light), var(--go)); border-radius: 2px; transition: width 0.4s ease; }

  .stack { position: relative; width: var(--card-w); height: 600px; margin: 10px 0 16px; }

  .card {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    cursor: grab;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    will-change: transform;
    touch-action: none;
    overflow: hidden;
  }
  .card:active { cursor: grabbing; }
  .card.behind-1 { transform: scale(0.95) translateY(12px); filter: brightness(0.7); pointer-events: none; }
  .card.behind-2 { transform: scale(0.90) translateY(24px); filter: brightness(0.5); pointer-events: none; }

  .stamp {
    position: absolute;
    top: 28px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: 2px;
    border: 3px solid;
    padding: 4px 14px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }
  .stamp.go { left: 20px; color: var(--go); border-color: var(--go); transform: rotate(-12deg); }
  .stamp.nogo { right: 20px; color: var(--nogo); border-color: var(--nogo); transform: rotate(12deg); }

  .card-tier {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
    width: fit-content;
  }
  .tier-a { background: rgba(29,185,84,0.15); color: var(--go); }
  .tier-b { background: rgba(45,125,210,0.15); color: var(--blue-light); }
  .tier-c { background: rgba(244,162,97,0.15); color: var(--amber); }

  .card-company { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; line-height: 1.2; margin-bottom: 6px; }
  .card-role { font-size: 15px; color: var(--blue-light); font-weight: 500; margin-bottom: 20px; }
  .card-divider { height: 1px; background: var(--border); margin-bottom: 18px; }

  .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 500; }
  .meta-value { font-size: 14px; font-weight: 500; color: var(--text); }
  .meta-value.salary { color: var(--go); font-family: 'Syne', sans-serif; font-weight: 700; }
  .meta-value.unknown { color: var(--text-muted); font-style: italic; font-size: 12px; }

  .score-section { margin-top: auto; }
  .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
  .score-number { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
  .score-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .score-fill { height: 100%; border-radius: 3px; }
  .routing-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .routing-dot { width: 8px; height: 8px; border-radius: 50%; }

  .swipe-hint { font-size: 11px; color: var(--text-muted); text-align: center; margin-bottom: 14px; letter-spacing: 0.5px; }

  .actions { display: flex; gap: 16px; align-items: center; justify-content: center; margin-bottom: 20px; }
  .btn { display: flex; align-items: center; justify-content: center; border: none; border-radius: 50px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; flex-shrink: 0; }
  .btn:active { transform: scale(0.94); }
  .btn-nogo { width: 64px; height: 64px; background: rgba(230,57,70,0.12); border: 2px solid rgba(230,57,70,0.4); color: var(--nogo); border-radius: 50%; font-size: 22px; }
  .btn-nogo:hover { background: rgba(230,57,70,0.22); box-shadow: 0 0 20px rgba(230,57,70,0.2); }
  .btn-go { width: 64px; height: 64px; background: rgba(29,185,84,0.12); border: 2px solid rgba(29,185,84,0.4); color: var(--go); border-radius: 50%; font-size: 22px; }
  .btn-go:hover { background: rgba(29,185,84,0.22); box-shadow: 0 0 20px rgba(29,185,84,0.2); }
  .btn-skip { width: 44px; height: 44px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 50%; font-size: 16px; }
  .btn-undo { width: 44px; height: 44px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 50%; font-size: 18px; }
  .btn-undo:not(:disabled):hover { background: var(--surface); color: var(--text); }
  .btn-undo:disabled { opacity: 0.3; cursor: not-allowed; }

  .empty { display: none; flex-direction: column; align-items: center; justify-content: center; height: 600px; width: var(--card-w); text-align: center; gap: 12px; }
  .empty-icon { font-size: 48px; margin-bottom: 8px; }
  .empty h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; }
  .empty p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
  .btn-reset { margin-top: 12px; padding: 12px 28px; background: var(--blue-light); color: white; border: none; border-radius: 50px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.2s; }
  .btn-reset:hover { opacity: 0.85; }

  .log-btn { position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; color: var(--text-muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; transition: background 0.2s; }
  .log-btn:hover { background: var(--surface); }
  .log-panel { position: fixed; bottom: 80px; right: 20px; width: 280px; max-height: 320px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; overflow-y: auto; z-index: 99; display: none; flex-direction: column; gap: 8px; }
  .log-panel.open { display: flex; }
  .log-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .log-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); padding: 6px 0; border-bottom: 1px solid var(--border); }
  .log-item:last-child { border-bottom: none; }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  @keyframes flyLeft { to { transform: translateX(-140%) rotate(-25deg); opacity: 0; } }
  @keyframes flyRight { to { transform: translateX(140%) rotate(25deg); opacity: 0; } }
  @keyframes flyUp { to { transform: translateY(-80%) scale(0.8); opacity: 0; } }
  .fly-left { animation: flyLeft 0.35s ease forwards; }
  .fly-right { animation: flyRight 0.35s ease forwards; }
  .fly-up { animation: flyUp 0.3s ease forwards; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 600px; width: var(--card-w); gap: 14px; color: var(--text-muted); font-size: 14px; }
  .error-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 600px; width: var(--card-w); gap: 10px; text-align: center; }
  .error-msg span { font-size: 36px; }
  .error-msg p { color: var(--text-muted); font-size: 13px; line-height: 1.6; }
  .card-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--blue-light); text-decoration: none; opacity: 0.8; }
  .card-link:hover { opacity: 1; }

  .card-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-type { background: rgba(45,125,210,0.15); color: var(--blue-light); }
  .badge-industry { background: rgba(244,162,97,0.15); color: var(--amber); }

  .card-desc-wrap { margin-bottom: 10px; }
  .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .btn-read-more { background: none; border: none; color: var(--blue-light); font-size: 11px; cursor: pointer; padding: 4px 0 0; font-family: 'DM Sans', sans-serif; display: block; }

  .desc-modal { position: fixed; inset: 0; z-index: 500; background: var(--surface); display: flex; flex-direction: column; }
  .desc-modal.hidden { display: none; }
  .desc-modal-bar { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 20px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .desc-modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; line-height: 1.3; }
  .desc-modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 50%; width: 34px; height: 34px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .desc-modal-body { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; line-height: 1.75; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }

  .card-recruiter { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); }
  .recruiter-name-val { font-size: 13px; font-weight: 500; }
  .recruiter-headline-val { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-footer { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; align-items: center; }

  /* No-go reason popup */
  .nogo-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
  }
  .nogo-overlay.open { opacity: 1; pointer-events: auto; }

  .nogo-popup {
    position: fixed; top: 50%; left: 50%; width: min(480px, 92vw);
    background: var(--surface); border: 1px solid rgba(230,57,70,0.25);
    border-radius: 20px; padding: 24px;
    z-index: 601;
    transform: translate(-50%, -50%) scale(0.9);
    opacity: 0; pointer-events: none;
    transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.2s ease;
  }
  .nogo-popup.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }

  .nogo-popup-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
  .nogo-popup-icon { font-size: 28px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
  .nogo-popup-job { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; line-height: 1.3; margin-bottom: 3px; color: var(--text); }
  .nogo-popup-company { font-size: 13px; color: var(--blue-light); }
  .nogo-popup-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
  .nogo-popup-reasons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .nogo-reason-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 10px 12px; font-size: 13px;
    font-family: 'DM Sans', sans-serif; text-align: left; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex; align-items: center; gap: 7px;
  }
  .nogo-reason-btn:hover { background: rgba(230,57,70,0.1); border-color: rgba(230,57,70,0.4); color: var(--nogo); }
  .nogo-reason-btn.full-width { grid-column: 1 / -1; }
  .nogo-reason-emoji { font-size: 15px; flex-shrink: 0; }
  .nogo-back-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; padding: 14px 0 0; display: block;
    width: 100%; text-align: center; transition: color 0.15s;
  }
  .nogo-back-btn:hover { color: var(--text); }
</style>
</head>
<body>

<a class="back-link" href="/Fee-Calculator-BURG/">← Terug</a>

<div class="header">
  <div class="logo">BURG <span>Vacatures</span></div>
  <div class="stats">
    <div class="stat"><strong id="count-go">0</strong>Go</div>
    <div class="stat"><strong id="count-nogo">0</strong>No go</div>
    <div class="stat"><strong id="count-left">—</strong>Over</div>
  </div>
</div>

<div class="progress-bar">
  <div class="progress-track">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>
</div>

<div class="stack" id="stack"></div>

<div class="empty" id="empty">
  <div class="empty-icon">✅</div>
  <h3>Sessie compleet</h3>
  <p>Je hebt alle vacatures beoordeeld.<br>De resultaten zijn opgeslagen.</p>
  <button class="btn-reset" onclick="resetDeck()">Nieuwe sessie starten</button>
</div>

<div class="swipe-hint" id="hint">← swipe of gebruik de knoppen →</div>

<div class="actions" id="actions">
  <button class="btn btn-nogo" onclick="doAction('nogo')" title="No go">✕</button>
  <button class="btn btn-undo" id="btn-undo" onclick="undoLast()" title="Herstel vorige beslissing" disabled>↩</button>
  <button class="btn btn-skip" onclick="doAction('skip')" title="Later">◦◦</button>
  <button class="btn btn-go" onclick="doAction('go')" title="Go">✓</button>
</div>

<button class="log-btn" onclick="toggleLog()">📋</button>
<div class="log-panel" id="log-panel">
  <div class="log-title">Beslissingen deze sessie</div>
  <div id="log-list"><p style="font-size:12px;color:var(--text-muted)">Nog geen beslissingen.</p></div>
</div>

<div class="desc-modal hidden" id="desc-modal">
  <div class="desc-modal-bar">
    <div class="desc-modal-title" id="desc-modal-title"></div>
    <button class="desc-modal-close" onclick="closeDescModal()">✕</button>
  </div>
  <div class="desc-modal-body" id="desc-modal-body"></div>
</div>

<div class="nogo-overlay" id="nogo-overlay" onclick="window.closeNogoPopup()"></div>
<div class="nogo-popup" id="nogo-popup">
  <div class="nogo-popup-header">
    <div class="nogo-popup-icon">✕</div>
    <div>
      <div class="nogo-popup-job" id="nogo-popup-title"></div>
      <div class="nogo-popup-company" id="nogo-popup-company"></div>
    </div>
  </div>
  <div class="nogo-popup-label">Waarom geen match?</div>
  <div class="nogo-popup-reasons">
    <button class="nogo-reason-btn" onclick="window.selectNogoReason('Verkeerde sector')"><span class="nogo-reason-emoji">🏭</span>Verkeerde sector</button>
    <button class="nogo-reason-btn" onclick="window.selectNogoReason('Te operationeel')"><span class="nogo-reason-emoji">🔧</span>Te operationeel</button>
    <button class="nogo-reason-btn" onclick="window.selectNogoReason('Intermediair / uitzendbureau')"><span class="nogo-reason-emoji">🤝</span>Intermediair</button>
    <button class="nogo-reason-btn" onclick="window.selectNogoReason('Te junior / stage')"><span class="nogo-reason-emoji">🎓</span>Te junior / stage</button>
    <button class="nogo-reason-btn" onclick="window.selectNogoReason('Buiten werkgebied')"><span class="nogo-reason-emoji">📍</span>Buiten werkgebied</button>
    <button class="nogo-reason-btn" onclick="window.selectNogoReason('Dubbeling / al bekend')"><span class="nogo-reason-emoji">📋</span>Al bekend</button>
    <button class="nogo-reason-btn full-width" onclick="window.selectNogoReason('Overig')"><span class="nogo-reason-emoji">💬</span>Overig</button>
  </div>
  <button class="nogo-back-btn" onclick="window.backFromNogoPopup()">← Terug naar vacature</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  'https://ziwqshuabwcthqjspuso.supabase.co',
  'sb_publishable_PxbxG-9ArQCsrgF9-lAM8g_-uglxVYU'
);

let vacatures = [];
let total = 0;
let current = 0, decisions = [], activeCard = null;
let pendingNogoVacId = null;

function mapRow(row) {
  return {
    id: row.id,
    bedrijf: row.company_name || '—',
    company_name: row.company_name || null,
    company_name_display: row.company_name_display || null,
    functie: row.job_title || '—',
    locatie: row.job_location || '—',
    bron: row.data_source || null,
    url: row.job_url || null,
    datumGescraped: row.date_scraped ? new Date(row.date_scraped).toLocaleDateString('nl-NL') : null,
    salary: row.salary || null,
    employment_type: row.employment_type || null,
    industry: row.industry || null,
    recruiter_name: row.recruiter_name || null,
    recruiter_headline: row.recruiter_headline || null,
    company_website: row.company_website || null,
    job_description: row.job_description || null,
  };
}

function esc(str) {
  return str ? str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}

function buildCard(vac, zIndex, cls) {
  const div = document.createElement('div');
  div.className = 'card ' + (cls || '');
  div.style.zIndex = zIndex;

  const badgesHtml = [
    vac.employment_type ? `<span class="badge badge-type">${esc(vac.employment_type)}</span>` : '',
    vac.industry ? `<span class="badge badge-industry">${esc(vac.industry)}</span>` : '',
  ].filter(Boolean).join('');

  const metaHtml = [
    `<div class="meta-item"><span class="meta-label">📍 Locatie</span><span class="meta-value">${esc(vac.locatie)}</span></div>`,
    vac.salary ? `<div class="meta-item"><span class="meta-label">💶 Salaris</span><span class="meta-value salary">${esc(vac.salary)}</span></div>` : '',
    vac.bron ? `<div class="meta-item"><span class="meta-label">🔍 Bron</span><span class="meta-value">${esc(vac.bron)}</span></div>` : '',
    vac.datumGescraped ? `<div class="meta-item"><span class="meta-label">📅 Gevonden</span><span class="meta-value">${esc(vac.datumGescraped)}</span></div>` : '',
  ].filter(Boolean).join('');

  const descHtml = vac.job_description ? `
    <div class="card-desc-wrap">
      <div class="card-desc">${esc(vac.job_description)}</div>
      <button class="btn-read-more" data-title="${esc(vac.functie)} — ${esc(vac.bedrijf)}" data-desc="${esc(vac.job_description)}" onclick="event.stopPropagation();window.openDescModal(this.dataset.title,this.dataset.desc)">Lees meer ↓</button>
    </div>` : '';

  const recruiterHtml = vac.recruiter_name ? `
    <div class="card-recruiter">
      <div class="recruiter-label">Geplaatst door</div>
      <div class="recruiter-name-val">${esc(vac.recruiter_name)}</div>
      ${vac.recruiter_headline ? `<div class="recruiter-headline-val">${esc(vac.recruiter_headline)}</div>` : ''}
    </div>` : '<div class="card-recruiter" style="margin-top:auto;border-top:none;padding-top:0"></div>';

  const footerLinks = [
    vac.url ? `<a class="card-link" href="${esc(vac.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ Bekijk vacature</a>` : '',
    vac.company_website ? `<a class="card-link" href="${esc(vac.company_website)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🌐 Website</a>` : '',
  ].filter(Boolean).join('');

  div.innerHTML = `
    <div class="stamp go">GO</div>
    <div class="stamp nogo">NO GO</div>
    <div class="card-company">${esc(vac.bedrijf)}</div>
    <div class="card-role">${esc(vac.functie)}</div>
    ${badgesHtml ? `<div class="card-badges">${badgesHtml}</div>` : ''}
    <div class="card-divider"></div>
    <div class="card-meta">${metaHtml}</div>
    ${descHtml}
    ${recruiterHtml}
    ${footerLinks ? `<div class="card-footer">${footerLinks}</div>` : ''}`;
  return div;
}

function showLoading() {
  const stack = document.getElementById('stack');
  stack.innerHTML = '<div class="loading"><div class="spinner"></div><span>Vacatures laden…</span></div>';
  stack.style.display = '';
  document.getElementById('hint').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
}

function showError(msg) {
  const stack = document.getElementById('stack');
  stack.innerHTML = `<div class="error-msg"><span>⚠️</span><p>${msg}</p></div>`;
}

async function loadVacatures() {
  showLoading();
  const { data, error } = await supabase
    .from('jobs')
    .select('id, job_title, company_name, company_name_display, job_location, job_url, data_source, date_scraped, posted_at, salary, employment_type, industry, recruiter_name, recruiter_headline, company_website, job_description')
    .in('review_status', ['pending', 'new']);

  if (error) {
    showError('Kon vacatures niet laden.<br>' + error.message);
    return;
  }

  const SOURCE_ORDER = { 'LinkedIn': 0, 'Indeed': 1, 'Werkzoeken.nl': 2 };
  data.sort((a, b) => {
    const ao = SOURCE_ORDER[a.data_source] ?? 99;
    const bo = SOURCE_ORDER[b.data_source] ?? 99;
    if (ao !== bo) return ao - bo;
    const at = a.posted_at ? new Date(a.posted_at).getTime() : 0;
    const bt = b.posted_at ? new Date(b.posted_at).getTime() : 0;
    return bt - at;
  });

  vacatures = data.map(mapRow);
  total = vacatures.length;
  current = 0;
  decisions = [];

  document.getElementById('hint').style.display = '';
  document.getElementById('actions').style.display = '';
  renderStack();
}

function renderStack() {
  const stack = document.getElementById('stack');
  stack.innerHTML = '';
  if (current >= total) {
    stack.style.display = 'none';
    document.getElementById('empty').style.display = 'flex';
    document.getElementById('hint').style.display = 'none';
    document.getElementById('actions').style.display = 'none';
    return;
  }
  for (let i = Math.min(current + 2, total - 1); i >= current; i--) {
    const offset = i - current;
    const cls = offset === 0 ? '' : offset === 1 ? 'behind-1' : 'behind-2';
    const card = buildCard(vacatures[i], 10 - offset, cls);
    stack.appendChild(card);
    if (offset === 0) { activeCard = card; setupDrag(card); }
  }
  updateStats();
}

function updateStats() {
  document.getElementById('count-go').textContent = decisions.filter(d => d.action === 'go').length;
  document.getElementById('count-nogo').textContent = decisions.filter(d => d.action === 'nogo').length;
  document.getElementById('count-left').textContent = total - current;
  document.getElementById('progress').style.width = (current / total * 100) + '%';
}

async function triggerGoWebhook(vac) {
  try {
    await fetch('https://mvl1009.app.n8n.cloud/webhook/d9c398f5-d635-4fd2-b4ce-231b3bc087fe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: vac.id }),
    });
  } catch (e) {
    console.warn('Webhook mislukt:', e);
  }
}

async function saveDecision(vac, action) {
  const statusMap = { go: 'approved', nogo: 'rejected', skip: 'pending' };
  if (action === 'skip') return;
  await supabase
    .from('jobs')
    .update({ review_status: statusMap[action], reviewed_at: new Date().toISOString() })
    .eq('id', vac.id);
}

function updateUndoBtn() {
  const btn = document.getElementById('btn-undo');
  if (btn) btn.disabled = decisions.length === 0;
}

async function undoLast() {
  if (decisions.length === 0) return;
  const last = decisions.pop();
  current--;
  if (last.action !== 'skip') {
    await supabase
      .from('jobs')
      .update({ review_status: 'pending', reviewed_at: null })
      .eq('id', last.vac.id);
  }
  const list = document.getElementById('log-list');
  const firstItem = list.querySelector('.log-item');
  if (firstItem) {
    firstItem.remove();
    if (!list.querySelector('.log-item')) {
      list.innerHTML = '<p style="font-size:12px;color:var(--text-muted)">Nog geen beslissingen.</p>';
    }
  }
  renderStack();
  updateUndoBtn();
}

function doAction(action) {
  if (current >= total || !activeCard) return;
  const vac = vacatures[current];
  decisions.push({ vac, action });
  updateUndoBtn();
  addLog(vac, action);
  saveDecision(vac, action);
  if (action === 'go') triggerGoWebhook(vac);
  const animClass = action === 'go' ? 'fly-right' : action === 'nogo' ? 'fly-left' : 'fly-up';
  activeCard.classList.add(animClass);
  if (action === 'go') { const s = activeCard.querySelector('.stamp.go'); if (s) s.style.opacity = '1'; }
  if (action === 'nogo') { const s = activeCard.querySelector('.stamp.nogo'); if (s) s.style.opacity = '1'; }
  if (action === 'nogo') {
    setTimeout(() => { current++; showNogoReasonPopup(vac); }, 320);
  } else {
    setTimeout(() => { current++; renderStack(); }, 320);
  }
}

function setupDrag(card) {
  let startX, startY, dragging = false;
  function onStart(e) {
    dragging = true;
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX; startY = pt.clientY;
    card.style.transition = 'none';
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - startX;
    const dy = pt.clientY - startY;
    card.style.transform = `translateX(${dx}px) translateY(${dy * 0.3}px) rotate(${dx * 0.08}deg)`;
    const sg = card.querySelector('.stamp.go');
    const sn = card.querySelector('.stamp.nogo');
    if (sg) sg.style.opacity = dx > 30 ? Math.min((dx - 30) / 80, 1) : 0;
    if (sn) sn.style.opacity = dx < -30 ? Math.min((-dx - 30) / 80, 1) : 0;
  }
  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const dx = pt.clientX - startX;
    card.style.transition = '';
    if (dx > 80) doAction('go');
    else if (dx < -80) doAction('nogo');
    else {
      card.style.transform = '';
      card.querySelectorAll('.stamp').forEach(s => s.style.opacity = 0);
    }
  }
  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}

function addLog(vac, action) {
  const list = document.getElementById('log-list');
  if (list.querySelector('p')) list.innerHTML = '';
  const item = document.createElement('div');
  item.className = 'log-item';
  const dotColor = action === 'go' ? '#1db954' : action === 'nogo' ? '#e63946' : '#8888a0';
  const label = action === 'go' ? 'Go' : action === 'nogo' ? 'No go' : 'Later';
  item.innerHTML = `<div class="log-dot" style="background:${dotColor}"></div><span><strong>${vac.bedrijf}</strong> — ${label}</span>`;
  list.insertBefore(item, list.firstChild);
}

function showNogoReasonPopup(vac) {
  pendingNogoVacId = vac.id;
  document.getElementById('nogo-popup-title').textContent = vac.functie;
  document.getElementById('nogo-popup-company').textContent = vac.bedrijf;
  document.getElementById('nogo-overlay').classList.add('open');
  document.getElementById('nogo-popup').classList.add('open');
}

async function selectNogoReason(reason) {
  if (pendingNogoVacId) {
    await supabase.from('jobs').update({ nogo_reason: reason }).eq('id', pendingNogoVacId);
  }
  closeNogoPopup();
}

function closeNogoPopup() {
  document.getElementById('nogo-overlay').classList.remove('open');
  document.getElementById('nogo-popup').classList.remove('open');
  pendingNogoVacId = null;
  renderStack();
}

async function backFromNogoPopup() {
  document.getElementById('nogo-overlay').classList.remove('open');
  document.getElementById('nogo-popup').classList.remove('open');
  pendingNogoVacId = null;
  await undoLast();
}

function toggleLog() { document.getElementById('log-panel').classList.toggle('open'); }

async function resetDeck() {
  document.getElementById('log-list').innerHTML = '<p style="font-size:12px;color:var(--text-muted)">Nog geen beslissingen.</p>';
  document.getElementById('empty').style.display = 'none';
  await loadVacatures();
}

window.doAction = doAction;
window.undoLast = undoLast;
window.toggleLog = toggleLog;
window.resetDeck = resetDeck;
window.selectNogoReason = selectNogoReason;
window.closeNogoPopup = closeNogoPopup;
window.backFromNogoPopup = backFromNogoPopup;
window.openDescModal = function(title, desc) {
  document.getElementById('desc-modal-title').textContent = title;
  document.getElementById('desc-modal-body').textContent = desc;
  document.getElementById('desc-modal').classList.remove('hidden');
};
window.closeDescModal = function() {
  document.getElementById('desc-modal').classList.add('hidden');
};

loadVacatures();
</script>
