<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a18">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>BURG — Jobpull Overdracht</title>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    // ─── EMAILJS CONFIGURATIE ─────────────────────────────────────────────────
    // Stap 1: Maak een gratis account op https://www.emailjs.com
    // Stap 2: Maak een Email Service aan (bijv. Gmail) en kopieer de Service ID
    // Stap 3: Maak een Email Template aan en kopieer de Template ID
    // Stap 4: Kopieer je Public Key uit Account > API Keys
    // Vervang de waarden hieronder:
    const EMAILJS_PUBLIC_KEY  = 'tojkMyUVtV2ZhNoN9';
    const EMAILJS_SERVICE_ID  = 'service_tdpa3m9';
    const EMAILJS_TEMPLATE_ID = 'template_0re2a5g';

    // Ontvangers (voeg 2-3 e-mailadressen toe):
    const ONTVANGERS = [
      'nils.denherder@burgqhsse.nl',
    ];
    // ─────────────────────────────────────────────────────────────────────────
  </script>

  <link rel="stylesheet" href="./styles.css">

  <style>
    /* Jobpull-specifiek: brede wrap (styles.css .card = 560px, jobpull heeft 860px) */
    .wrap { width: 100%; max-width: 860px; }

    /* Jobpull-specifiek: page-header blok */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 24px; font-weight: 500; color: #1a1a18; margin-bottom: 4px; }
    .page-header p { font-size: 14px; color: #73726c; }

    /* Jobpull-specifiek: back link extra marge */
    .back { margin-bottom: 1.5rem; }

    /* Jobpull-specifiek: oranje toggle variant (zit niet in styles.css) */
    .btn-toggle.active-orange { background: #c47d00; color: #fff; border-color: #c47d00; }

    /* Jobpull-specifiek: submit-wrap flex-wrap */
    .submit-wrap { flex-wrap: wrap; }

    /* Jobpull-specifiek: time drum picker */
    .time-picker-wrap {
      display: flex; align-items: center; gap: 4px;
      border: 1.5px solid rgba(0,0,0,0.15); border-radius: 10px;
      padding: 4px 8px; background: #fff; overflow: hidden;
    }
    .drum-col {
      flex: 1; height: 120px; overflow-y: scroll;
      scroll-snap-type: y mandatory; scrollbar-width: none;
      position: relative;
    }
    .drum-col::-webkit-scrollbar { display: none; }
    .drum-item {
      height: 40px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 500; color: #1a1a18;
      scroll-snap-align: center; cursor: pointer; border-radius: 6px;
      transition: background 0.1s;
    }
    .drum-item.selected { color: #1a1a18; background: rgba(0,0,0,0.06); border-radius: 6px; }
    .drum-item:not(.selected) { color: #b0afa8; }
    .drum-sep { font-size: 20px; font-weight: 600; color: #1a1a18; padding: 0 2px; }
    .tijd-bevestiging {
      display: flex; align-items: center; gap: 6px; margin-top: 8px;
      font-size: 13px; color: #3b6d11; font-weight: 500;
    }
    .tijd-bevestiging span { font-weight: 700; }
    /* Padding items zodat eerste/laatste item centreerbaar zijn */
    .drum-col::before, .drum-col::after {
      content: ''; display: block; height: 40px;
    }

    /* Desktop: jobpull body blijft flex-start (styles.css zet center op 640px) */
    @media (min-width: 640px) {
      body { align-items: flex-start; }
    }

    /* Dark mode: page-header en drum picker */
    @media (prefers-color-scheme: dark) {
      .page-header h1 { color: #e0dfd8; }
      .page-header p { color: #888780; }
      .time-picker-wrap { background: #333330; border-color: rgba(255,255,255,0.15); }
      .drum-item { color: #b0afa8; }
      .drum-item.selected { color: #e0dfd8; background: rgba(255,255,255,0.08); }
      .drum-sep { color: #e0dfd8; }
      .tijd-bevestiging { color: #97c459; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <a href="./" class="back">‹ Terug</a>

    <div class="page-header">
      <h1>Jobpull Overdracht</h1>
      <p>Vul alle velden in om de overdracht van Sales naar Consultant te completeren</p>
    </div>

    <!-- SECTIE 1: BETROKKENEN -->
    <div class="section-card">
      <div class="section-label">Betrokkenen</div>
      <div class="grid-3">
        <div class="field">
          <label>Sales</label>
          <input type="text" id="sales-naam" placeholder="Naam Salestijger" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>Bedrijfsnaam</label>
          <input type="text" id="bedrijf" placeholder="Naam opdrachtgever" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>Functietitel vacature</label>
          <input type="text" id="functie" placeholder="bijv. QHSSE Manager" oninput="markFilled(this)">
        </div>
      </div>

      <hr class="divider">

      <div class="field">
        <label>Geschatte senioriteit</label>
        <div class="btn-toggle-group">
          <button class="btn-toggle" onclick="setSenioriteit('Onboarding', this)">Onboarding</button>
          <button class="btn-toggle" onclick="setSenioriteit('Medior', this)">Medior</button>
          <button class="btn-toggle" onclick="setSenioriteit('Senior', this)">Senior</button>
        </div>
        <input type="hidden" id="senioriteit" value="">
      </div>
    </div>

    <!-- SECTIE 2: GESPREKSPARTNERS -->
    <div class="section-card">
      <div class="section-label">Gesprekspartners</div>
      <div class="grid-2">
        <div class="field">
          <label>Gesprekspartner 1 (naam + functie)</label>
          <input type="text" id="gp1" placeholder="bijv. Jan de Vries — HR Manager" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>Gesprekspartner 2 (naam + functie)</label>
          <input type="text" id="gp2" placeholder="bijv. Lisa Smit — Directeur" oninput="markFilled(this)">
        </div>
      </div>
    </div>

    <!-- SECTIE 3: AFSPRAAK -->
    <div class="section-card">
      <div class="section-label">Afspraak</div>
      <div class="grid-3">
        <div class="field">
          <label>Datum afspraak</label>
          <input type="date" id="datum" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>Tijd afspraak</label>
          <div class="time-picker-wrap" id="tijd-wrap">
            <div class="drum-col" id="drum-hour"></div>
            <div class="drum-sep">:</div>
            <div class="drum-col" id="drum-min"></div>
          </div>
          <div class="tijd-bevestiging" id="tijd-bevestiging">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle cx="6.5" cy="6.5" r="6.5" fill="#3b6d11"/>
              <path d="M3.5 6.5L5.5 8.5L9.5 4.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="tijd-label">08:00</span> geselecteerd
          </div>
          <input type="hidden" id="tijd">
        </div>
        <div class="field">
          <label>Type afspraak</label>
          <div class="btn-toggle-group">
            <button class="btn-toggle" onclick="setTypeAfspraak('Teams', this)">🖥 Teams</button>
            <button class="btn-toggle" onclick="setTypeAfspraak('Op locatie', this)">📍 Op locatie</button>
          </div>
          <input type="hidden" id="type-afspraak" value="">
        </div>
      </div>

      <!-- Conditioneel: alleen bij op locatie -->
      <div class="conditional" id="locatie-block">
        <div class="grid-2">
          <div class="field">
            <label>Exact adres locatie</label>
            <input type="text" id="adres" placeholder="Straat 1, 1234 AB Stad" oninput="markFilled(this)">
          </div>
          <div class="field">
            <label>Auto gereserveerd?</label>
            <div class="btn-toggle-group">
              <button class="btn-toggle" onclick="setAuto('Ja', this)" id="auto-ja">Ja</button>
              <button class="btn-toggle" onclick="setAuto('Nee', this)" id="auto-nee">Nee</button>
            </div>
            <input type="hidden" id="auto" value="">
          </div>
        </div>
      </div>
    </div>

    <!-- SECTIE 4: INFO OVER DE JOB -->
    <div class="section-card">
      <div class="section-label">Info over de job</div>
      <div class="grid-2">

        <div class="field full">
          <label>Beschrijving van de job</label>
          <textarea id="beschrijving" placeholder="Geef een korte omschrijving van de rol, context en verwachtingen..." oninput="markFilled(this)"></textarea>
        </div>

        <div class="field">
          <label>Hoe lang wordt er al gezocht?</label>
          <select id="zoekduur" onchange="markFilled(this)">
            <option value="" disabled selected>Kies een optie</option>
            <option>Minder dan 1 maand</option>
            <option>1–3 maanden</option>
            <option>3–6 maanden</option>
            <option>Langer dan 6 maanden</option>
            <option>Onbekend</option>
          </select>
        </div>

        <div class="field">
          <label>Zijn er andere bureaus ingeschakeld?</label>
          <div class="btn-toggle-group">
            <button class="btn-toggle" onclick="setBureaus('Nee', this)">Nee</button>
            <button class="btn-toggle" onclick="setBureaus('Ja', this)">Ja</button>
            <button class="btn-toggle" onclick="setBureaus('Onbekend', this)">Onbekend</button>
          </div>
          <input type="hidden" id="bureaus" value="">
        </div>

        <div class="field">
          <label>Zijn er kandidaten in proces?</label>
          <div class="btn-toggle-group">
            <button class="btn-toggle" onclick="setKandidaten('Nee', this)">Nee</button>
            <button class="btn-toggle" onclick="setKandidaten('Ja', this)">Ja</button>
            <button class="btn-toggle" onclick="setKandidaten('Onbekend', this)">Onbekend</button>
          </div>
          <input type="hidden" id="kandidaten" value="">
        </div>

        <div class="field">
          <label>Salarisindicatie</label>
          <input type="text" id="salaris" placeholder="bijv. € 4.500 – € 6.000 / mnd" oninput="markFilled(this)">
        </div>

        <div class="field full">
          <label>Voorwaarden aanwezig?</label>
          <div class="btn-toggle-group" style="max-width:200px;">
            <button class="btn-toggle" onclick="setVoorwaarden('Ja', this)">Ja</button>
            <button class="btn-toggle" onclick="setVoorwaarden('Nee', this)">Nee</button>
          </div>
          <input type="hidden" id="voorwaarden" value="">
          <div class="conditional" id="voorwaarden-block">
            <div class="grid-2" style="margin-top:16px;">
              <div class="field">
                <label>Fee percentage</label>
                <div class="text-input-wrap" style="display:flex;align-items:center;border:1.5px solid rgba(0,0,0,0.15);border-radius:8px;overflow:hidden;">
                  <input type="text" id="fee-pct" placeholder="bijv. 20" inputmode="decimal" oninput="markFilled(this)" style="border:none;padding:10px 12px;font-size:15px;background:transparent;width:100%;outline:none;font-family:inherit;">
                  <span style="padding:0 12px;color:#73726c;font-size:14px;">%</span>
                </div>
              </div>
              <div class="field">
                <label>Exclusiviteit</label>
                <div class="btn-toggle-group">
                  <button class="btn-toggle" onclick="setExclusief('Exclusief', this)">Exclusief</button>
                  <button class="btn-toggle" onclick="setExclusief('Niet exclusief', this)">Niet exclusief</button>
                </div>
                <input type="hidden" id="exclusief" value="">
              </div>
            </div>
          </div>
        </div>

        <div class="field full">
          <label>Aanvullende opmerkingen (optioneel)</label>
          <textarea id="opmerkingen" placeholder="Overige relevante informatie voor de consultant..." oninput="markFilled(this)"></textarea>
        </div>

      </div>
    </div>

    <!-- SUBMIT -->
    <div class="section-card">
      <div class="submit-wrap">
        <span class="submit-note" id="submit-note">Vul alle verplichte velden in</span>
        <button class="btn-submit" id="btn-submit" onclick="verzenden()">Overdracht versturen →</button>
      </div>
      <div class="status-banner" id="status-banner"></div>
    </div>

  </div><!-- /wrap -->

  <script>
    emailjs.init(EMAILJS_PUBLIC_KEY);

    // ── Time drum picker ──
    function buildDrum(colId, items, defaultIndex) {
      const col = document.getElementById(colId);
      items.forEach((val, i) => {
        const div = document.createElement('div');
        div.className = 'drum-item' + (i === defaultIndex ? ' selected' : '');
        div.textContent = val;
        col.appendChild(div);
      });
      // Scroll naar default
      col.scrollTop = defaultIndex * 40;
      col.addEventListener('scroll', () => {
        const idx = Math.round(col.scrollTop / 40);
        col.querySelectorAll('.drum-item').forEach((d, i) => d.classList.toggle('selected', i === idx));
        updateTijd();
      });
    }

    function getDrumValue(colId) {
      const col = document.getElementById(colId);
      const idx = Math.round(col.scrollTop / 40);
      return col.querySelectorAll('.drum-item')[idx]?.textContent || '00';
    }

    function updateTijd() {
      const h = getDrumValue('drum-hour');
      const m = getDrumValue('drum-min');
      const val = h + ':' + m;
      document.getElementById('tijd').value = val;
      document.getElementById('tijd-wrap').classList.add('filled-border');
      document.getElementById('tijd-label').textContent = val;
    }

    const hours = Array.from({length: 24}, (_, i) => String(i).padStart(2, '0'));
    const mins  = Array.from({length: 12}, (_, i) => String(i * 5).padStart(2, '0'));
    buildDrum('drum-hour', hours, 8); // default 08
    buildDrum('drum-min', mins, 0);   // default :00
    updateTijd();

    // ── State ──
    let senioriteit = '', typeAfspraak = '', auto = '';
    let bureaus = '', kandidaten = '', voorwaarden = '';

    // ── Helpers ──
    function markFilled(el) {
      el.classList.toggle('filled', el.value.trim().length > 0);
    }

    function setToggle(hiddenId, val, btn, groupClass) {
      document.getElementById(hiddenId).value = val;
      document.querySelectorAll('.' + groupClass).forEach(b => b.classList.remove('active', 'active-green', 'active-red'));
      btn.classList.add('active');
    }

    function setSenioriteit(val, btn) {
      senioriteit = val;
      document.getElementById('senioriteit').value = val;
      document.querySelectorAll('#senioriteit ~ .btn-toggle-group .btn-toggle, .btn-toggle-group').forEach(() => {});
      btn.closest('.btn-toggle-group').querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function setTypeAfspraak(val, btn) {
      typeAfspraak = val;
      document.getElementById('type-afspraak').value = val;
      btn.closest('.btn-toggle-group').querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const block = document.getElementById('locatie-block');
      block.classList.toggle('visible', val === 'Op locatie');
    }

    function setAuto(val, btn) {
      auto = val;
      document.getElementById('auto').value = val;
      btn.closest('.btn-toggle-group').querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active', 'active-green', 'active-red'));
      btn.classList.add(val === 'Ja' ? 'active-green' : 'active-red');
    }

    function setBureaus(val, btn) {
      bureaus = val;
      document.getElementById('bureaus').value = val;
      btn.closest('.btn-toggle-group').querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active','active-green','active-red','active-orange'));
      if (val === 'Nee') btn.classList.add('active-green');
      else if (val === 'Ja') btn.classList.add('active-red');
      else btn.classList.add('active-orange');
    }

    function setKandidaten(val, btn) {
      kandidaten = val;
      document.getElementById('kandidaten').value = val;
      btn.closest('.btn-toggle-group').querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active','active-green','active-red','active-orange'));
      if (val === 'Nee') btn.classList.add('active-green');
      else if (val === 'Ja') btn.classList.add('active-red');
      else btn.classList.add('active-orange');
    }

    function setVoorwaarden(val, btn) {
      voorwaarden = val;
      document.getElementById('voorwaarden').value = val;
      btn.closest('.btn-toggle-group').querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active','active-green','active-red','active-orange'));
      btn.classList.add(val === 'Ja' ? 'active-green' : 'active-red');
      document.getElementById('voorwaarden-block').classList.toggle('visible', val === 'Ja');
    }

    let exclusief = '';
    function setExclusief(val, btn) {
      exclusief = val;
      document.getElementById('exclusief').value = val;
      btn.closest('.btn-toggle-group').querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active','active-green','active-red'));
      btn.classList.add('active');
    }

    // ── Formulier verzenden ──
    async function verzenden() {
      const btn = document.getElementById('btn-submit');
      const banner = document.getElementById('status-banner');

      const data = {
        sales_naam:    document.getElementById('sales-naam').value.trim(),
        bedrijf:       document.getElementById('bedrijf').value.trim(),
        functie:       document.getElementById('functie').value.trim(),
        senioriteit:   document.getElementById('senioriteit').value,
        gp1:           document.getElementById('gp1').value.trim(),
        gp2:           document.getElementById('gp2').value.trim(),
        datum:         document.getElementById('datum').value,
        tijd:          document.getElementById('tijd').value,
        type_afspraak: document.getElementById('type-afspraak').value,
        adres:         document.getElementById('adres').value.trim() || '—',
        auto:          document.getElementById('auto').value || '—',
        beschrijving:  document.getElementById('beschrijving').value.trim(),
        zoekduur:      document.getElementById('zoekduur').value,
        bureaus:       document.getElementById('bureaus').value,
        kandidaten:    document.getElementById('kandidaten').value,
        salaris:       document.getElementById('salaris').value.trim(),
        voorwaarden:   document.getElementById('voorwaarden').value,
        fee_pct:       document.getElementById('fee-pct')?.value.trim() || '—',
        exclusief:     document.getElementById('exclusief').value || '—',
        opmerkingen:   document.getElementById('opmerkingen').value.trim() || '—',
      };

      // Validatie
      const required = ['sales_naam','bedrijf','functie','senioriteit','gp1','datum','tijd','type_afspraak','beschrijving','zoekduur','bureaus','kandidaten','salaris','voorwaarden'];
      const missing = required.filter(k => !data[k]);
      if (missing.length > 0) {
        banner.className = 'status-banner error';
        banner.textContent = '⚠️ Vul alle verplichte velden in voor je verstuurt.';
        return;
      }

      btn.disabled = true;
      banner.className = 'status-banner sending';
      banner.textContent = '⏳ Bezig met versturen...';

      // Stuur naar alle ontvangers
      try {
        for (const to of ONTVANGERS) {
          await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { ...data, to_email: to });
        }
        banner.className = 'status-banner success';
        banner.textContent = '✅ Overdracht succesvol verstuurd naar alle ontvangers!';
        btn.textContent = 'Verstuurd ✓';
      } catch (err) {
        console.error(err);
        banner.className = 'status-banner error';
        banner.textContent = '❌ Versturen mislukt. Controleer de EmailJS configuratie.';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
